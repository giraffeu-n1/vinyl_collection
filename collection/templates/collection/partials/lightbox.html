<div id="lightbox" class="lightbox" hidden aria-hidden="true" role="dialog" aria-label="Просмотр фотографии">
  <button type="button" class="lightbox-close" aria-label="Закрыть">&times;</button>
  <button type="button" class="lightbox-nav lightbox-prev" aria-label="Предыдущее">&#10094;</button>
  <button type="button" class="lightbox-nav lightbox-next" aria-label="Следующее">&#10095;</button>
  <div class="lightbox-content">
    <img src="" alt="" id="lightbox-image">
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>
</div>
